<!DOCTYPE html>
<html>
<head>
    <title>Edit Equipment</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background-color: #f0f0f0; }
        .form-container { background: white; padding: 30px; border-radius: 8px; max-width: 500px; margin: 0 auto; }
        h1 { color: #333; }
        label { display: block; margin-top: 15px; font-weight: bold; }
        input, select { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        button { margin-top: 20px; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
        .save-btn { background-color: #4CAF50; color: white; }
        .cancel-btn { background-color: #666; color: white; margin-left: 10px; }
    </style>
</head>
<body>
    <div class="form-container">
        <h1>Edit Equipment</h1>
        <form method="POST">
            <label>Item ID:</label>
            <input type="text" name="fob_id" value="{{ fob.fob_id }}" readonly style="background: #f5f5f5;">
            <label>Name:</label>
            <input type="text" name="vehicle_name" value="{{ fob.vehicle_name }}" required>
            <label>Category:</label>
            <select name="category">
                <option value="Discontinued" {% if fob.category == 'Discontinued' %}selected{% endif %}>Discontinued</option>
                <option value="Rentables" {% if fob.category == 'Rentables' %}selected{% endif %}>Rentables</option>
                <option value="Garage" {% if fob.category == 'Garage' %}selected{% endif %}>Garage</option>
                <option value="Lighting" {% if fob.category == 'Lighting' %}selected{% endif %}>Lighting</option>
                <option value="Tools" {% if fob.category == 'Tools' %}selected{% endif %}>Tools</option>
                <option value="Window Coverings" {% if fob.category == 'Window Coverings' %}selected{% endif %}>Window Coverings</option>
                <option value="Key Room" {% if fob.category == 'Key Room' %}selected{% endif %}>Key Room</option>
                <option value="Electrical" {% if fob.category == 'Electrical' %}selected{% endif %}>Electrical</option>
                <option value="Hardware" {% if fob.category == 'Hardware' %}selected{% endif %}>Hardware</option>
                <option value="Plumbing" {% if fob.category == 'Plumbing' %}selected{% endif %}>Plumbing</option>
                <option value="Building Materials" {% if fob.category == 'Building Materials' %}selected{% endif %}>Building Materials</option>
                <option value="HVAC" {% if fob.category == 'HVAC' %}selected{% endif %}>HVAC</option>
                <option value="Cleaning" {% if fob.category == 'Cleaning' %}selected{% endif %}>Cleaning</option>
                <option value="Vehicles" {% if fob.category == 'Vehicles' %}selected{% endif %}>Vehicles</option>
                <option value="Keys" {% if fob.category == 'Keys' %}selected{% endif %}>Keys</option>
            </select>
            <label>Location:</label>
            <input type="text" name="location" value="{{ fob.location }}" required>
            <button type="submit" class="save-btn">Save Changes</button>
            <a href="/admin#fobs"><button type="button" class="cancel-btn">Cancel</button></a>
        </form>
    </div>
</body>
</html>
